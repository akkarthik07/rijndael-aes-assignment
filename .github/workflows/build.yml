name: Build the project and run tests
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build the code
        run: |
          sudo apt install -y build-essential python-is-python3
          make clean
          make

      - name: Run tests
        run: python3 tests/test_rijndael.py